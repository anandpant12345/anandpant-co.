<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.addEventListener('error', function(e) {
            var errorDiv = document.createElement('div');
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '0';
            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';
            errorDiv.style.background = 'red';
            errorDiv.style.color = 'white';
            errorDiv.style.padding = '20px';
            errorDiv.style.zIndex = '99999';
            errorDiv.style.fontFamily = 'monospace';
            errorDiv.style.whiteSpace = 'pre-wrap';
            errorDiv.innerHTML = '<h2>JavaScript Error Caught:</h2>' + e.message + '\n' + e.filename + ':' + e.lineno + '\n\nStack:\n' + (e.error ? e.error.stack : 'No stack trace available');
            document.body.appendChild(errorDiv);
        });
        window.addEventListener('unhandledrejection', function(e) {
            var errorDiv = document.createElement('div');
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '0';
            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';
            errorDiv.style.background = 'orange';
            errorDiv.style.color = 'white';
            errorDiv.style.padding = '20px';
            errorDiv.style.zIndex = '99999';
            errorDiv.style.fontFamily = 'monospace';
            errorDiv.style.whiteSpace = 'pre-wrap';
            errorDiv.innerHTML = '<h2>Unhandled Promise Rejection:</h2>' + e.reason;
            document.body.appendChild(errorDiv);
        });
    </script>
